name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: cargo test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test

  wheels:
    name: wheels (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          # pyo3 0.20 supports up to 3.12; abi3 makes the wheel forward-compatible
          # to 3.8+ so one build per OS covers all interpreter versions.
          python-version: "3.12"
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          command: build
          args: --release --out dist --manifest-path bindings/Cargo.toml
          manylinux: ${{ matrix.os == 'ubuntu-latest' && 'auto' || '' }}
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: dist

  sdist:
    name: sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist --manifest-path bindings/Cargo.toml
      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist

  # Gated. Runs only on a v* tag, and only with secrets set.
  # No-op until a tag is pushed and PYPI_API_TOKEN + CARGO_REGISTRY_TOKEN exist.
  publish:
    name: publish
    needs: [test, wheels, sdist]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Publish crate to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish
      # Gather the per-OS wheels + sdist built by the wheels/sdist jobs and upload
      # them all, so PyPI gets real cross-platform artifacts (not an ubuntu rebuild).
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Publish to PyPI
        uses: PyO3/maturin-action@v1
        env:
          MATURIN_PYPI_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        with:
          command: upload
          args: --skip-existing dist/*
